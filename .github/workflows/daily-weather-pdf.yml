name: Daily Weather PDF

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  fetch_weather:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium

    - name: Fetch NOAA PDF
      run: python scripts/fetch_noaa_pdf.py

    - name: Upload PDF as artifact
      uses: actions/upload-artifact@v4
      with:
        name: weather_forecast
        path: weather_forecast.pdf
        retention-days: 7

    - name: Create GitHub Issue with PDF
      uses: actions/github-script@v7
      with:
        script: |
          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Daily NOAA Weather Forecast - ${new Date().toLocaleDateString()}`,
            body: `Your daily weather forecast has been generated. Download the PDF from the workflow artifacts.\n\n[View Workflow Run](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
          });